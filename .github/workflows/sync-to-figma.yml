name: Deploy Web and Sync to Figma

on:
  push:
    branches:
      - main
  workflow_dispatch:

# 設定權限，允許 GitHub Actions 幫您發布網頁
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 任務一：編譯並產生前端網頁
  deploy-web:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install and Build Web
        # 如果是 React/TSX，通常用 npm run build。如果是純 HTML，可以直接上傳根目錄
        run: |
          npm ci
          npm run build --if-present 

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 如果有 build，改成您的輸出資料夾（如 dist 或 build）。若是純 HTML 專案，保持 '.' 即可
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

    # 將網頁網址傳給下一個任務
    outputs:
      web_url: ${{ steps.deployment.outputs.page_url }}

  # 任務二：把產生的網頁網址塞進 Figma 畫面中
  sync-to-figma:
    needs: deploy-web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update Figma Link
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
          FILE_KEY: "pWSBzud1e8GXH9fhN0bc62"
          LIVE_WEB_URL: ${{ needs.deploy-web.outputs.web_url }}
        run: |
          echo "網頁已成功產生！網址為: $LIVE_WEB_URL"
          
          # 1. 自動抓取 Figma 的實體框框 ID
          RAW_RESPONSE=$(curl -s -X GET "https://api.figma.com/v1/files/$FILE_KEY" -H "X-Figma-Token: $FIGMA_TOKEN")
          FIRST_NODE_ID=$(echo "$RAW_RESPONSE" | jq -r '.. | select(.type? == "FRAME" or .type? == "COMPONENT") | .id' | head -n 1)
          
          if [ -z "$FIRST_NODE_ID" ] || [ "$FIRST_NODE_ID" = "null" ]; then
            FIRST_NODE_ID=$(echo "$RAW_RESPONSE" | jq -r '.document.children[0].children[0].id' || echo "0:1")
          fi
          
          # 2. 將「可以點開的網頁網址」直接掛載到 Figma
          curl -X POST "https://api.figma.com/v1/files/$FILE_KEY/dev_resources" \
            -H "X-Figma-Token: $FIGMA_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "dev_resources": [
                {
                  "name": "👉 點擊開啟最新排班前端網頁",
                  "url": "'$LIVE_WEB_URL'",
                  "file_key": "'$FILE_KEY'",
                  "node_id": "'$FIRST_NODE_ID'"
                }
              ]
            }'