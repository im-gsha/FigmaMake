name: Push to Update Figma

on:
  push:
    branches:
      - main
  # 保留手動觸發按鈕，方便您測試
  workflow_dispatch:

jobs:
  sync-code-to-figma:
    runs-on: ubuntu-latest

    steps:
      # 1. 複製 GitHub 上的最新前端原始碼
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 設定 Node.js 環境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 或使用您的專案 Node 版本
          cache: 'npm'

      # 3. 安裝前端依賴套件（包含您的 UI 元件與排班顯示邏輯）
      - name: Install Dependencies
        run: npm ci

      # # 4. 執行同步指令，將最新的代碼結構與樣式推送到 Figma
      # - name: Publish to Figma Connect
      #   env:
      #     FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
      #     FIGMA_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }} # 雙重保險
      #   run: npx @figma/code-connect connect # ✨ 修正這裡，加上 @figma/ 和 code-connect
      - name: Update Figma Make Content
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
          FILE_KEY: "pWSBzud1e8GXH9fhN0bc62" # 您的 Make 檔案 ID
        run: |
          echo "正在從全新的 Design File 中抓取畫面結構..."
          
          # 1. 先透過 API 自動抓取您全新檔案的第一個畫布節點 ID (Node ID)
          FIRST_NODE_ID=$(curl -s -X GET "https://api.figma.com/v1/files/$FILE_KEY" \
            -H "X-Figma-Token: $FIGMA_TOKEN" | jq -r '.document.children[0].id' || echo "0:1")
          
          echo "成功抓取到目標節點 ID: $FIRST_NODE_ID"
          echo "正在將最新代碼與排班狀態推送到 Figma..."
          
          # 2. 將連結與前端代碼 commit 狀態正式掛載上去
          curl -X POST "https://api.figma.com/v1/files/$FILE_KEY/dev_resources" \
            -H "X-Figma-Token: $FIGMA_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "dev_resources": [
                {
                  "name": "GitHub 最新前端程式碼與排班狀態",
                  "url": "https://github.com/${{ github.repository }}/commit/${{ github.sha }}",
                  "file_key": "'$FILE_KEY'",
                  "node_id": "'$FIRST_NODE_ID'"
                }
              ]
            }'